<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContiGO — Hacemos tus trámites más simples, juntos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="landing-body">

<div class="bg-animated">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
  <div class="bg-dots"></div>
</div>

<main class="landing-stage">
  <div class="landing-card">

    <div class="landing-logo">
      <svg width="56" height="40" viewBox="0 0 90 60" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="14" r="9" fill="#ffffff"/>
        <circle cx="48" cy="14" r="9" fill="#8bb4ff"/>
        <path d="M14 38c0-9 7-16 16-16s12 8 17 8 9-8 16-8 16 7 16 16-7 16-16 16-12-8-17-8-9 8-16 8-16-7-16-16z"
              fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
        <path d="M14 38c0-9 7-16 16-16s12 8 17 8 9-8 16-8 16 7 16 16-7 16-16 16-12-8-17-8-9 8-16 8-16-7-16-16z"
              fill="none" stroke="#8bb4ff" stroke-width="6" stroke-linecap="round" stroke-dasharray="60 200"/>
      </svg>
      <div class="logo-text">Conti<span>GO</span></div>
    </div>
    <p class="landing-tagline">Hacemos tus trámites más simples, juntos.</p>

    <div class="landing-actions">
      <button class="btn-landing btn-landing-primary" data-track="click_crear_cuenta" onclick="openAuthChoice('register')">
        Crear cuenta
      </button>
      <button class="btn-landing btn-landing-outline" data-track="click_iniciar_sesion" onclick="openAuthChoice('login')">
        Iniciar sesión
      </button>
    </div>

    <div class="landing-features">
      <span>✓ Profesionales verificados</span>
      <span>🕐 Ahorra tiempo</span>
      <span>🔒 Trámites seguros</span>
      <span>🤝 Estamos contigo en cada paso</span>
    </div>
  </div>
</main>

<!-- MODAL Y TOAST -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-box" id="modalBox"></div>
</div>
<div id="toast" class="toast"></div>

<script src="{{ url_for('static', filename='js/tracking.js') }}"></script>
<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script src="{{ url_for('static', filename='js/landing.js') }}"></script>
</body>
</html>
